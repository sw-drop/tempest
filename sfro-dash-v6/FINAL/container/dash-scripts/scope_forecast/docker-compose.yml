services:
  updater:
    image: python:3.11-slim
    container_name: sfro-log
    # Attaches directly to the host network for Tailscale resolution
    # network_mode: host
    networks:
      - cloudflare-net
    working_dir: /app
    env_file: .env
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python -u update_dashboard.py"
    volumes:
      - ./:/app
    restart: unless-stopped

    labels:
      - io.portainer.accesscontrol.users=agent
  web:
    image: nginx:alpine
    container_name: SFRO-Nightly
    ports:
      - "5002:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
    restart: unless-stopped
    # Nginx stays safely on the Cloudflare network!
    networks:
      - cloudflare-net

    labels:
      - io.portainer.accesscontrol.users=agent
networks:
  cloudflare-net:
    external: true
