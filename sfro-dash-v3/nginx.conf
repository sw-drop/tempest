server {
    listen 80;
    server_name localhost;
    charset utf-8;

    # Serve static dashboard files and pre-rendered JSON/JPEGs
    location / {
        root /var/www/html;
        index index.html;
        try_files $uri $uri/ =404;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}
